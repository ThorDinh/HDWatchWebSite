<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/layout/index :: dynamic(~{::main})}">
<body>
<main>
		<!-- SECTION -->
		<div class="section">
			<div class="container" style="width:500px">

				<!-- Login -->
				<form th:action="@{/security/login}" class="login-form" id="login-form"
					method="post">
					<h2>Đăng nhập</h2>
					<div class="form-group">
						<label for="username">Tên đăng nhập:</label> <input type="text"
							class="form-control" id="username" name="username"
							placeholder="Nhập tên đăng nhập" required>
					</div>
					<div class="form-group">
						<label for="password">Mật khẩu:</label> <input type="password"
							class="form-control" id="password" name="password"
							placeholder="Nhập mật khẩu" required>
					</div>
					<div class="form-check">
						<input type="checkbox" class="form-check-input" id="remember">
						<label class="form-check-label" for="remember">Ghi nhớ?</label>
					</div>
					<button type="submit" class="btn btn-primary">Đăng nhập</button>
					<div class="form-links">
						<label for="register-link">Chưa có tài khoản? <a
							href="register.html">Đăng ký ngay</a></label> <label for="forgot-link">Quên
							mật khẩu? <a href="forgotpassword.html">Lấy lại mật khẩu</a>
						</label>
					</div>
				</form>

			</div>
		</div>

		<!-- /SECTION -->

</main>
</body>
</html>
